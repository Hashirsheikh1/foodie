<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - QuickBite</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your QuickBite account</p>

      <div id="error-alert" class="alert alert-error hidden"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;" id="login-btn">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register.html">Create one</a>
      </div>
    </div>
  </main>

  <script type="module">
    import { renderNavbar } from "./js/app.js";
    import { handleLogin, getAuthErrorMessage, redirectIfLoggedIn } from "./js/auth.js";

    // Redirect if already logged in
    await redirectIfLoggedIn();

    renderNavbar(null);

    const form = document.getElementById("login-form");
    const errorAlert = document.getElementById("error-alert");
    const loginBtn = document.getElementById("login-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorAlert.classList.add("hidden");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        errorAlert.textContent = "Please fill in all fields.";
        errorAlert.classList.remove("hidden");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Signing in...";

      try {
        await handleLogin(email, password);
      } catch (error) {
        errorAlert.textContent = getAuthErrorMessage(error.code);
        errorAlert.classList.remove("hidden");
        loginBtn.disabled = false;
        loginBtn.textContent = "Sign In";
      }
    });
  </script>
</body>
</html>
