<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - QuickBite</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
  </div>

  <!-- Navbar -->
  <nav class="navbar" id="navbar"></nav>

  <main class="section" style="max-width:900px; margin:0 auto;">
    <div class="dashboard-header">
      <h1>My Orders</h1>
      <p>Track the status of your orders</p>
    </div>

    <div id="orders-list">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/></svg>
        <h3>Loading orders...</h3>
      </div>
    </div>
  </main>

  <script type="module" src="./js/orders.js"></script>
</body>
</html>
